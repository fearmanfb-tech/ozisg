name: Deploy to cPanel (ozisg.com)

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: FTP Deploy → ozisg.com
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:     ${{ secrets.FTP_SERVER }}
          username:   ${{ secrets.FTP_USERNAME }}
          password:   ${{ secrets.FTP_PASSWORD }}
          port:       21
          server-dir: public_html/
          local-dir:  ./
          state-name: .ftp-deploy-sync-v2
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**
            **/README.md
            **/.env
            **/.DS_Store
            **/Thumbs.db
